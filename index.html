<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BiBi Brew</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #C8372C;
    --bg: #FAF4EE;
    --surface: #FFFFFF;
    --surface2: #F3EBE2;
    --surface3: #EAE0D4;
    --text: #2C1A12;
    --text-muted: #A07860;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
  }

  /* ── Red header — logo centered and blended ── */
  .header {
    background: var(--red);
    padding: 40px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .logo-img {
    width: 75%;
    max-width: 280px;
    display: block;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    margin-bottom: 24px;
    background: var(--bg);
  }

  .tab {
    flex: 1;
    padding: 14px 0;
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: 18px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
    border: none;
    background: none;
  }

  .tab.active { color: var(--text); }

  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 20%; right: 20%;
    height: 2px;
    background: var(--red);
    border-radius: 2px 2px 0 0;
  }

  /* ── Content ── */
  .content {
    padding: 0 16px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  /* ── Brew cards ── */
  .brew-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .brew-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 18px;
    background: var(--surface);
    border-radius: 14px;
    cursor: pointer;
    border: 1.5px solid transparent;
    transition: all 0.18s ease;
  }

  .brew-card:hover { background: var(--surface2); }
  .brew-card.active { background: var(--surface2); border-color: var(--red); }

  .brew-name {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .brew-ratio {
    background: var(--red);
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 9px;
    border-radius: 8px;
  }

  /* ── Slider ── */
  .slider-section { margin-bottom: 4px; }

  .slider-label {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .slider-label span { color: var(--text); font-weight: 600; }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 4px;
    background: var(--surface3);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 2px 8px rgba(200,55,44,0.5);
    cursor: pointer;
    transition: transform 0.1s;
  }

  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.15); }

  /* ── Stats ── */
  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .stat-box {
    background: var(--surface);
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
  }

  .stat-value {
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-unit { font-size: 12px; color: var(--text-muted); }

  /* ── Tip ── */
  .tip-box {
    background: var(--surface);
    border-left: 3px solid var(--red);
    border-radius: 0 12px 12px 0;
    padding: 14px 16px;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ── Pot buttons ── */
  .pot-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .pot-btn {
    padding: 16px;
    border-radius: 14px;
    border: 1.5px solid var(--surface3);
    background: var(--surface);
    cursor: pointer;
    text-align: center;
    transition: all 0.18s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .pot-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  .pot-name {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    font-weight: 700;
    color: inherit;
  }

  .pot-sub {
    font-size: 12px;
    color: var(--text-muted);
  }

  .pot-btn.active .pot-sub { color: rgba(255,255,255,0.7); }

  /* ── Notes ── */
  .notes-section { display: none; }
  .notes-section.visible { display: flex; flex-direction: column; gap: 10px; }
  .calc-section.hidden { display: none; }

  .diary-entry {
    background: var(--surface);
    border-radius: 14px;
    padding: 16px;
  }

  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }

  .entry-style {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    color: var(--text);
  }

  .entry-date { font-size: 12px; color: var(--text-muted); }
  .entry-note { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
  .entry-meta { display: flex; gap: 10px; margin-top: 10px; }

  .entry-tag {
    background: var(--surface3);
    color: var(--text-muted);
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 6px;
  }

  .add-btn {
    width: 100%;
    padding: 14px;
    background: var(--red);
    color: white;
    border: none;
    border-radius: 14px;
    font-family: 'Caveat', cursive;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .add-btn:hover { opacity: 0.88; }
  .stars { color: #e8a838; font-size: 13px; }

  .delete-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 6px;
    transition: color 0.15s;
    line-height: 1;
  }
  .delete-btn:hover { color: var(--red); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 100;
    justify-content: flex-end;
    align-items: flex-end;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    border-radius: 24px 24px 0 0;
    padding: 28px 20px 36px;
    width: 100%;
    max-width: 400px;
    max-height: 88vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
    animation: slideUp 0.25s ease;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to   { transform: translateY(0); }
  }

  .modal-title {
    font-family: 'Caveat', cursive;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .modal label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    display: block;
    margin-bottom: 8px;
  }

  .style-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .style-pill {
    font-family: 'Caveat', cursive;
    font-size: 16px;
    padding: 7px 16px;
    border-radius: 50px;
    border: 1.5px solid var(--surface3);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .style-pill.active { background: var(--red); border-color: var(--red); color: white; }

  .star-picker { display: flex; gap: 6px; }

  .star-btn {
    font-size: 24px;
    background: none;
    border: none;
    cursor: pointer;
    color: #ddd;
    transition: color 0.1s;
    padding: 0;
    line-height: 1;
  }
  .star-btn.lit { color: #e8a838; }

  .modal textarea {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--surface3);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 90px;
    line-height: 1.5;
  }
  .modal textarea::placeholder { color: var(--text-muted); }
  .modal textarea:focus { border-color: var(--red); }

  .modal-actions {
    display: flex;
    gap: 10px;
  }

  .btn-cancel {
    flex: 1;
    padding: 13px;
    background: var(--surface);
    border: none;
    border-radius: 12px;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    color: var(--text-muted);
    cursor: pointer;
  }

  .btn-save {
    flex: 2;
    padding: 13px;
    background: var(--red);
    border: none;
    border-radius: 12px;
    font-family: 'Caveat', cursive;
    font-size: 17px;
    font-weight: 700;
    color: white;
    cursor: pointer;
  }

  .modal input[type=text] {
    width: 100%;
    background: var(--surface);
    border: 1.5px solid var(--surface3);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
  }
  .modal input[type=text]::placeholder { color: var(--text-muted); }
  .modal input[type=text]:focus { border-color: var(--red); }

  .tasting-groups { display: flex; flex-direction: column; gap: 8px; }

  .tasting-group-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .tasting-pills { display: flex; flex-wrap: wrap; gap: 6px; }

  .tasting-pill {
    font-family: 'Caveat', cursive;
    font-size: 15px;
    padding: 5px 13px;
    border-radius: 50px;
    border: 1.5px solid var(--surface3);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .tasting-pill.active {
    background: var(--red);
    border-color: var(--red);
    color: white;
  }

  .taste-tag {
    background: #FDECEA;
    color: var(--red);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
  }
</style>
</head>

  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('calc', this)">Scale</button>
    <button class="tab" onclick="switchTab('notes', this)">Notes</button>
  </div>

  <div class="content">

    <div class="calc-section" id="calc">
      <div class="section-label">Brew Style</div>
      <div class="brew-list">
        <div class="brew-card active" onclick="selectBrew(this, 16, 'MoccaMaster', 'Great for morning brews — just press start and let it do its thing. We love it with a medium roast.', 31)">

          <span class="brew-ratio">1:16</span>
        </div>
        <div class="brew-card" onclick="selectBrew(this, 15, 'Pour Over', 'Take your time, pour slow. The ritual is half the fun. Best with a light, fruity roast.', 20)">
          <span class="brew-name">Pour Over</span>
          <span class="brew-ratio">1:15</span>
        </div>
        <div class="brew-card" onclick="selectBrew(this, 10, 'Cold Brew', '', 100)">
          <span class="brew-name">Cold Brew</span>
          <span class="brew-ratio">1:10</span>
        </div>
      </div>

      <!-- MoccaMaster: half / full pot buttons -->
      <div id="pot-section" style="display:block; margin-top:20px;">
        <div class="pot-buttons">
          <button class="pot-btn active" id="pot-half" onclick="selectPot('half')">
            <span class="pot-name">half pot</span>
            <span class="pot-sub">32g · 500ml</span>
          </button>
          <button class="pot-btn" id="pot-full" onclick="selectPot('full')">
            <span class="pot-name">full pot</span>
            <span class="pot-sub">64g · 1000ml</span>
          </button>
        </div>
      </div>

      <!-- Slider for Pour Over & Cold Brew -->
      <div style="margin-top:20px; display:none;" class="slider-section" id="slider-section">

      </div>

      <div class="stats">
        <div class="stat-box">

          <div class="stat-unit">beans</div>
        </div>
        <div class="stat-box">
          <div class="stat-value" id="stat-water">1000ml</div>
          <div class="stat-unit">water</div>
        </div>
        <div class="stat-box">

          <div class="stat-unit">grinder</div>
        </div>

    <div class="notes-section" id="notes">
      <div id="notes-list"></div>
      <button class="add-btn" onclick="openModal()">+ Add Note</button>
    </div>

    <p style="text-align:center;font-size:11px;color:var(--text-muted);padding:24px 0 8px;opacity:0.55;letter-spacing:0.04em;">for Kamila ♥</p>

  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">New Note</div>

    <div>
      <label>Coffee Name</label>
      <input id="coffee-name" type="text" placeholder="e.g. Ethiopia Yirgacheffe" autocomplete="off">
    </div>

    <div>
      <label>Brew Style</label>
      <div class="style-pills">
        <button class="style-pill active" onclick="selectStyle(this, 'MoccaMaster')">MoccaMaster</button>
        <button class="style-pill" onclick="selectStyle(this, 'Pour Over')">Pour Over</button>
        <button class="style-pill" onclick="selectStyle(this, 'Cold Brew')">Cold Brew</button>
      </div>
    </div>

    <div>
      <label>Rating</label>
      <div class="star-picker" id="star-picker">
        <button class="star-btn lit" onclick="setRating(1)">★</button>
        <button class="star-btn lit" onclick="setRating(2)">★</button>
        <button class="star-btn lit" onclick="setRating(3)">★</button>
        <button class="star-btn" onclick="setRating(4)">★</button>
        <button class="star-btn" onclick="setRating(5)">★</button>
      </div>
    </div>

    <div>
      <label>Tasting Notes</label>
      <div class="tasting-groups">
        <div class="tasting-group-label">Fruity</div>
        <div class="tasting-pills" id="tasting-pills">
          <button class="tasting-pill" onclick="toggleTaste(this)">Blueberry</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Strawberry</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Citrus</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Peach</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Tropical</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Cherry</button>
        </div>
        <div class="tasting-group-label">Sweet</div>
        <div class="tasting-pills">
          <button class="tasting-pill" onclick="toggleTaste(this)">Chocolate</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Caramel</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Honey</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Brown Sugar</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Vanilla</button>
        </div>
        <div class="tasting-group-label">Nutty &amp; Roasty</div>
        <div class="tasting-pills">
          <button class="tasting-pill" onclick="toggleTaste(this)">Almond</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Hazelnut</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Walnut</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Toasted</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Smoky</button>
        </div>
        <div class="tasting-group-label">Floral &amp; Herbal</div>
        <div class="tasting-pills">
          <button class="tasting-pill" onclick="toggleTaste(this)">Jasmine</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Rose</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Lavender</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Earl Grey</button>
        </div>
        <div class="tasting-group-label">Body &amp; Feel</div>
        <div class="tasting-pills">
          <button class="tasting-pill" onclick="toggleTaste(this)">Bright</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Smooth</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Balanced</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Syrupy</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Crisp</button>
          <button class="tasting-pill" onclick="toggleTaste(this)">Bold</button>
        </div>
      </div>
    </div>

    <div>
      <label>Extra Notes</label>
      <textarea id="note-text" placeholder="Anything else worth remembering?"></textarea>
    </div>

    <div>
      <label>Coffee Bag Photo</label>
      <div id="photo-upload-area" onclick="document.getElementById('photo-input').click()" style="cursor:pointer;border:2px dashed var(--surface3);border-radius:12px;padding:16px;text-align:center;background:var(--surface);transition:border-color 0.2s;">
        <div id="photo-placeholder" style="color:var(--text-muted);font-size:13px;">📷 Tap to add a photo</div>
        <img id="photo-preview" src="" alt="" style="display:none;width:100%;border-radius:8px;object-fit:cover;max-height:160px;">
      </div>
      <input id="photo-input" type="file" accept="image/*" style="display:none" onchange="handlePhoto(this)">
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveNote()">Save Note</button>
    </div>
  </div>
</div>

<script>
  let currentRatio = 16;
  let currentStyle = 'MoccaMaster';
  const grindMap = { MoccaMaster: '6–8', 'Pour Over': '4–6', 'Cold Brew': '9–11' };
  let selectedPot = 'half';

  function selectBrew(el, ratio, style, tip, defaultBeans) {
    document.querySelectorAll('.brew-card').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    currentRatio = ratio; currentStyle = style;
    const isMocca = style === 'MoccaMaster';
    document.getElementById('pot-section').style.display = isMocca ? 'block' : 'none';
    document.getElementById('slider-section').style.display = isMocca ? 'none' : 'block';
    if (isMocca) {
      selectedPot = 'half';
      document.getElementById('pot-half').classList.add('active');
      document.getElementById('pot-full').classList.remove('active');
      updateStats(32, 500);
    } else {
      document.getElementById('beans-slider').value = defaultBeans;
      updateCalc();
    }
  }

  function selectPot(size) {
    selectedPot = size;
    document.getElementById('pot-half').classList.toggle('active', size === 'half');
    document.getElementById('pot-full').classList.toggle('active', size === 'full');
    const beans = size === 'half' ? 32 : 64;
    const water = size === 'half' ? 500 : 1000;
    updateStats(beans, water);
  }

  function updateStats(beans, water) {
    document.getElementById('stat-beans').textContent = beans + 'g';
    document.getElementById('stat-water').textContent = water + 'ml';
    document.getElementById('stat-grind').textContent = grindMap[currentStyle] || '—';
  }

  function updateCalc() {
    const beans = parseInt(document.getElementById('beans-slider').value);
    const water = beans * currentRatio;
    document.getElementById('beans-label').textContent = beans + 'g';
    updateStats(beans, water);
    const pct = ((beans - 5) / 145) * 100;
    document.getElementById('beans-slider').style.background =
      `linear-gradient(to right, #C8372C ${pct}%, #EAE0D4 ${pct}%)`;
  }

  function switchTab(id, btn) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('calc').classList.toggle('hidden', id !== 'calc');
    document.getElementById('notes').classList.toggle('visible', id === 'notes');
  }

  // ── Notes / Modal ──
  let notes = JSON.parse(localStorage.getItem('bibi-notes') || '[]');
  let modalStyle = 'MoccaMaster';
  let modalRating = 3;
  let modalPhoto = null;

  function renderNotes() {
    const list = document.getElementById('notes-list');
    if (notes.length === 0) {
      list.innerHTML = '<p style="text-align:center;color:var(--text-muted);font-size:14px;padding:20px 0;">No notes yet — add your first brew!</p>';
      return;
    }
    list.innerHTML = notes.slice().reverse().map((n, ri) => {
      const i = notes.length - 1 - ri;
      const stars = '★'.repeat(n.rating) + '☆'.repeat(5 - n.rating);
      const tasteTags = (n.tastes || []).map(t => `<span class="taste-tag">${t}</span>`).join('');
      const otherTags = `<span class="entry-tag">${n.style}</span>`;
      return `<div class="diary-entry">
        ${n.photo ? `<img src="${n.photo}" alt="coffee bag" style="width:100%;border-radius:10px;object-fit:cover;max-height:180px;margin-bottom:10px;">` : ''}
        <div class="entry-header">
          <span class="entry-style">${n.name || 'Unnamed Coffee'}</span>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="entry-date">${n.date}</span>
            <button class="delete-btn" onclick="deleteNote(${i})">✕</button>
          </div>
        </div>
        <div class="stars" style="margin-bottom:6px;">${stars}</div>
        <div class="entry-meta" style="flex-wrap:wrap;gap:6px;">
          ${otherTags}${tasteTags}
        </div>
        ${n.text ? `<div class="entry-note" style="margin-top:10px;">${n.text}</div>` : ''}
      </div>`;
    }).join('');
  }

  function openModal() {
    modalStyle = 'MoccaMaster';
    modalRating = 3;
    modalPhoto = null;
    document.getElementById('coffee-name').value = '';
    document.getElementById('note-text').value = '';
    document.getElementById('photo-input').value = '';
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('photo-placeholder').style.display = 'block';
    document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
    document.querySelector('.style-pill').classList.add('active');
    document.querySelectorAll('.tasting-pill').forEach(p => p.classList.remove('active'));
    setRating(3);
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  function selectStyle(el, style) {
    document.querySelectorAll('.style-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
    modalStyle = style;
  }

  function toggleTaste(el) {
    el.classList.toggle('active');
  }

  function setRating(r) {
    modalRating = r;
    document.querySelectorAll('.star-btn').forEach((btn, i) => {
      btn.classList.toggle('lit', i < r);
    });
  }

  function handlePhoto(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        const canvas = document.createElement('canvas');
        const maxW = 600;
        const scale = Math.min(1, maxW / img.width);
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        modalPhoto = canvas.toDataURL('image/jpeg', 0.7);
        document.getElementById('photo-preview').src = modalPhoto;
        document.getElementById('photo-preview').style.display = 'block';
        document.getElementById('photo-placeholder').style.display = 'none';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function saveNote() {
    const name = document.getElementById('coffee-name').value.trim();
    const text = document.getElementById('note-text').value.trim();
    const tastes = [...document.querySelectorAll('.tasting-pill.active')].map(p => p.textContent);
    const now = new Date();
    const date = now.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
    notes.push({ name, style: modalStyle, rating: modalRating, tastes, text, date, photo: modalPhoto });
    localStorage.setItem('bibi-notes', JSON.stringify(notes));
    renderNotes();
    closeModal();
  }

  function deleteNote(i) {
    notes.splice(i, 1);
    localStorage.setItem('bibi-notes', JSON.stringify(notes));
    renderNotes();
  }

  renderNotes();
  updateStats(32, 500);
</script>
</body>
</html>
